<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Countdown Timer</title>
<link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/1mf4iWWPuJVF-ynEhXLjtLpgOZ0w1d6M9">
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0f14;
    font-family: 'Courier New', monospace;
    color: #fff;
  }
  .panel {
    text-align: center;
    border: 1px solid #1f3a3a;
    padding: 70px 105px;
    border-radius: 14px;
    background: #0f1720;
    box-shadow: 0 0 30px rgba(79, 209, 197, 0.15);
  }
  .current-time {
    font-size: 30px;
    letter-spacing: 5px;
    color: #fff;
    margin-bottom: 40px;
    font-variant-numeric: tabular-nums;
  }
  h1 {
    font-size: 30px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #33ccff;
    margin-bottom: 35px;
    font-weight: normal;
  }
  .clock {
    font-size: 120px;
    letter-spacing: 7px;
    font-variant-numeric: tabular-nums;
  }
  .status {
    margin-top: 28px;
    font-size: 30px;
    color: #33ccff;
  }
  .set-row {
    margin-top: 42px;
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: center;
  }
  input[type="text"] {
    background: #0a0f14;
    border: 1px solid #1f3a3a;
    color: #33ccff;
    font-family: 'Courier New', monospace;
    font-size: 30px;
    padding: 10px 18px;
    border-radius: 6px;
    width: 110px;
    text-align: center;
  }
  button {
    background: #143b38;
    border: 1px solid #4fd1c5;
    color: #33ccff;
    font-family: 'Courier New', monospace;
    font-size: 30px;
    letter-spacing: 2px;
    padding: 9px 18px;
    border-radius: 6px;
    cursor: pointer;
  }
  button:hover {
    background: #1a4d49;
  }
</style>
</head>
<body>
  <div class="panel">
    <div class="current-time" id="currentTime">--:--</div>
    <h1 id="title">Time Remaining Until 21:00</h1>
    <div class="clock" id="clock">--:--:--</div>
    <div class="status" id="status"></div>
    <div class="set-row">
      <input type="text" id="timeInput" value="21:00" maxlength="5" inputmode="numeric" placeholder="HH:MM" onkeydown="if (event.key === 'Enter') { setTarget(); this.blur(); }">
      <button onclick="setTarget()">Set</button>
      <button onclick="resetTarget()">Reset</button>
    </div>
  </div>

<script>
const DEFAULT_HOURS = 21;
const DEFAULT_MINUTES = 0;
const STORAGE_KEY = 'countdownTargetTime';

let targetHours = DEFAULT_HOURS;
let targetMinutes = DEFAULT_MINUTES;

function applyTarget(h, m, save) {
  targetHours = h;
  targetMinutes = m;
  const timeString = String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
  document.getElementById('title').textContent = 'Time Remaining Until ' + timeString;
  document.getElementById('timeInput').value = timeString;
  document.getElementById('status').textContent = '';
  if (save) {
    try {
      localStorage.setItem(STORAGE_KEY, timeString);
    } catch (e) {
      // Storage unavailable (e.g. private browsing); the timer still works, it just won't persist.
    }
  }
  update();
}

function setTarget() {
  const val = document.getElementById('timeInput').value.trim();
  const match = val.match(/^([01]?[0-9]|2[0-3]):([0-5][0-9])$/);
  const statusEl = document.getElementById('status');
  if (!match) {
    statusEl.textContent = 'Enter a valid 24-hour time as HH:MM';
    return;
  }
  const h = Number(match[1]);
  const m = Number(match[2]);
  applyTarget(h, m, true);
}

function resetTarget() {
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (e) {
    // Ignore if storage isn't available
  }
  applyTarget(DEFAULT_HOURS, DEFAULT_MINUTES, false);
}

function loadSavedTarget() {
  let saved = null;
  try {
    saved = localStorage.getItem(STORAGE_KEY);
  } catch (e) {
    // Ignore if storage isn't available
  }
  if (saved) {
    const [h, m] = saved.split(':').map(Number);
    applyTarget(h, m, false);
  } else {
    applyTarget(DEFAULT_HOURS, DEFAULT_MINUTES, false);
  }
}

function update() {
  const now = new Date();
  const target = new Date();
  target.setHours(targetHours, targetMinutes, 0, 0);

  let diff = target - now;
  const statusEl = document.getElementById('status');

  if (diff <= 0) {
    // Target already passed today (or falls after midnight relative to now), roll to the next occurrence
    target.setDate(target.getDate() + 1);
    diff = target - now;
  }

  const hours = Math.floor(diff / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  document.getElementById('clock').textContent =
    String(hours).padStart(2, '0') + ':' +
    String(minutes).padStart(2, '0') + ':' +
    String(seconds).padStart(2, '0');

  document.getElementById('currentTime').textContent =
    String(now.getHours()).padStart(2, '0') + ':' +
    String(now.getMinutes()).padStart(2, '0');
}

loadSavedTarget();
setInterval(update, 1000);
</script>
</body>
</html>
